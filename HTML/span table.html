<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>spans in html</title>
</head>
<body>
    <table border="1" style="width:20%;">
        <!--1st row-->
     <tr>
        <td colspan="4">1</td>
        
    </tr> 

    <!--2nd row-->
    <tr>
        <td rowspan="2">1</td>
        <td>2</td>
        <td>3</td>
        <td rowspan="2">4</td>
    </tr>
    <!--3rd row-->
    <tr>
        <td>1</td>
        <td>2</td>
       
    </tr>

    <!--4th row-->
    <tr>
        <td colspan="4">1</td>
        
    </tr>
    </table> 


    <!-- colspan -->
    <table border="n" style="border-collapse: collapse;">
        <tr>
            <th>Name</th>
            <th colspan="2">Phone No.</th>
        </tr>

        <tr>
            <td>Naina</td>
            <td>4877652390</td>
            <td>9887654333</td>
        </tr>
    </table>

    <!-- row span -->
     <table border="n" style="border-collapse: collapse">
        <tr>
            <th>Name</th>
            <th colspan="2">Phone No.</th>
        </tr>

        <tr>
            <td rowspan="2"><b>Contact</b></td>
            <td>9877654432</td>
            
        </tr>

        <tr>
            <td>9876543345</td>
        </tr>
     </table>

        
</body>
</html>
