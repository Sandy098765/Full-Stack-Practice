<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Captcha form in HTML</title>
</head>
<body>
    <h2 style="text-align: center;">Captcha Form</h2>
    <center><form autocomplete="off">
        <br>
        <fieldset>
            <legend>Personl Details</legend>
        <label for="captcha">Enter Captcha:</label>
        <input type="text" id="captcha" placeholder="Enter Captcha..." name="captcha">
        <br>
        <br>


        <label for="un">Username:</label>
        <input type="text" placeholder="Enter name..." id="un" name="Username">
        <br>
        <br>


        <label for="email">Email:</label>
        <input type="email" id="email" name="email">
        <br> 
        <br>


        <label>Password: <span style="color:red;">*</span></label>
        <input type="Password" name="pwd" >
        <br>
        <br>

        <label for="mobile">Mobile :</label>
        <input type="tel" id="mobile" name="mobile" placeholder="Enter number...">
        <br>
        <br>


        <label for="age">Age :</label>
        <input type="number" id="age" min="1" max="150">
        <br>
        <br>

        <label>Date of Birth:</label>
        <input type="date">
        <br>
        </fieldset>
        <br>

        <fieldset>
            <legend>Other Details</legend>
        <label>Date of Birth with time:</label>
        <input type="datetime-local">
        <br>
        <br>

        <label>Profile Url:</label>
        <input type="url" placeholder="Enter profile URL...">
        <br>
        <br>

        <label>other:</label>
        <input type="image">
        <br>
        <br>

        <label>Upload PAN Card</label>
        <input type="file">
        <br>
        <br>

        <label>Rate out of 5:</label>
        <input type="range" min="1" max="5"  name="HTML Rating" valu="0">
        <br>
        <br>
        
        <label><input type="checkbox" name="opt1" value="cash"> Cash</label>
        <label><input type="checkbox" name="opt2" value="razoepay"> Razoepay</label>
        <label><input type="checkbox" name="opt3" value="phonepay"> PhonePay</label>
        <br>
        <br>

        <label>Gender:</label>
        <label><input type="radio" name="opt" value="male" > Male</label>
        <label><input type="radio" name="opt" value="female" > Female</label>
        <br>
        <br>

        <label>You are allowed:</label>
        <input type="hidden">
        <br>
        <br>

        <label for="tech">Choose the tech Stack:</label>
        <select name="tech" id="tech">
            <option value="html">HTML</option>
            <option value="css">CSS</option>
            <option value="javascript">JavaScript</option>
        </select>
        <br>
        </fieldset>
        <br>

        
        <fieldset>
            <legend>Comment Section</legend>
        <label for="comments">Comments:</label>
        <textarea id="comments" rows="5" cols="40" name="comments" placeholder="Enter Commets...">
        </textarea>
        <br>
        <br>
        </fieldset>

        <input type="submit"> &nbsp; &nbsp; &nbsp; &nbsp;
        <input type="reset" value="cancel">
        <br>
        <br>
        <button>Help Center</button>
        
        
        </form></center>
        </body>
    </html>
