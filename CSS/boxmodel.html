<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Box Model</title>
        <!-- <link href="selectorsstyle.css" rel="stylesheet"> -->
         <style>
            /* Padding */
            *{
                margin: 0px;
            }
            div {
                width: 100px;
                height: 100px;
                background-color: aqua;
                padding: 20px;
                /* border-color: blue;
                border-style: dashed;
                border-width: 3px; */
                /* Shortend property */
                border: 5px solid red;
                /* 1 value 20px; top bottom left right */
                margin: 20px;
                /* 2 values 20px top bottom 40px left right */
                margin: 20px 40px;
                /* 3 values - 20px top 40px left right 60px bottom */
                margin: 20px 40px 60px;
                /* 4 values 20px top 40px right 60px bottom 100px left */
                margin: 20px 40px 60px 100px;
                margin-left: 200px;
                margin-top: 30px;
                outline: 10px dashed violet;
                box-shadow: 40px 20px 20px red;
            }
         </style>
    </head>
    <body>
        <div>Box Model</div>
        </body>
        </html>
