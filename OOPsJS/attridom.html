<!DOCTYPE html>
<html lang = "en"></html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Attributes of DOM</title>
    </head>
    <body>
        <a href="https://www.kodnest.com">Click to vist kodnest</a>
        <br>
        <br>
        <button onclick="setattr()">set attr</button>
        <button onclick="getattr()">get attr</button>
        <button onclick="removeattr()">remove attr</button>

        <script>
            let link = document.querySelector("a");
            function setattr() {
                link.setAttribute("href", "https://www.instagram.com");
                link.innerText = "click to vist instagram";
            }
        </script>

    </body>
</html>
