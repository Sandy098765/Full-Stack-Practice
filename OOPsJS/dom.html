<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Object Model(DOM)</title>
</head>
<body>
    <h1>DOM methods</h1>
    <p>getElementsByTagName</p>
    <p id="paraid" class="bluetext">getElementById</p>
    <p class="bluetext">getElementsByClassName</p>
    <p>getElementsByName</p>
    <h4 class="wb">Hello!</h4>
    <h4 class="wb">Thank you</h4>
    <input type="text" placeholder="Enter your fav hero" name="favhero">
    <p id="paraval">Value displayed here</p>
    <button onclick="change()">Click me to change</button>
    

    <script>
        let p = document.querySelectorAll(".wb");
        // let p = document.querySelectorAll("h4");
        p.forEach((p) => {p.style.backgroundColor = "black";  p.style.color = "white"});

        document.querySelector("h1").innerHTML = "<h3><i>DOM methods in JS</i></h3>"
        // document.querySelector("h1").innerText = "DOM methods in JS";
        document.querySelector("button").textContent = "Click me";
        // document.getElementsByTagName("p")[0].style.color = "red";
       document.getElementsByTagName("p")[0].style.color="green";
       document.getElementById("paraid").style.fontSize = "50px";
       

       let bt = document.getElementsByClassName("bluetext");
       for(let i=0; i<=bt.length; i++) {
            bt[i].style.color = "blue";
            bt[i].style.backgroundColor = "green";
       }


       function change() {
        let x = document.getElementsByName("favhero")[0].value;
        document.getElementById("paraval").innerText = x;



            let para = document.getElementsByTagName("p");
            for(let i=0; i<para.length; i++) {
                para[i].style.color = "red";
                para[i].style.backgroundColor = "yellow";
            }
       }



    
    </script>

</body>
</html>
